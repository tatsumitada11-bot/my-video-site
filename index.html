<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Master Kyle's Media Terminal</title>
    <style>
        body { background: #0a0a0a; color: #00ff41; font-family: 'Consolas', monospace; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .player-box { width: 90%; max-width: 800px; background: #000; border: 1px solid #00ff41; padding: 10px; box-shadow: 0 0 15px #00ff41; }
        video { width: 100%; border-radius: 4px; }
        .list-container { width: 90%; max-width: 800px; margin-top: 20px; text-align: left; }
        .video-btn { 
            display: block; width: 100%; padding: 12px; margin: 5px 0; 
            background: #111; color: #00ff41; border: 1px solid #00ff41; 
            text-align: left; cursor: pointer; text-decoration: none; font-size: 14px;
        }
        .video-btn:hover { background: #00ff41; color: #000; }
        .video-btn:active { transform: scale(0.98); }
        h2 { border-bottom: 1px solid #00ff41; padding-bottom: 5px; width: 100%; }
    </style>
</head>
<body>

    <h1>[MEDIA_BYPASS_SYSTEM_v3]</h1>

    <div class="player-box">
        <video id="mainPlayer" controls autoplay>
            <source id="videoSrc" src="" type="video/mp4">
            ブラウザをアップデートしろ、マスター。
        </video>
        <p id="nowPlaying">待機中...</p>
    </div>

    <div class="list-container">
        <h2>AVAILABLE_FILES</h2>
        
        <button class="video-btn" onclick="quickPlay('videoplayback (2).mp4', 'WARNING_VIDEO')">
            ▶ 実行: videoplayback (2).mp4
        </button>

        <button class="video-btn" onclick="quickPlay('sample.mp4', 'SAMPLE_MEDIA')">
            ▶ 実行: sample.mp4
        </button>
    </div>

    <script>
        function quickPlay(file, title) {
            const player = document.getElementById('mainPlayer');
            const source = document.getElementById('videoSrc');
            const label = document.getElementById('nowPlaying');

            // 読み込み先を書き換えて即再生！
            source.src = file;
            label.innerText = "再生中: " + title;
            
            player.load(); // 必須！
            player.play(); // これで自動で動き出す
        }
    </script>

</body>
</html>
